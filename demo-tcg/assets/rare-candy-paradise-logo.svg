<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" role="img" aria-labelledby="title desc">
  <title id="title">Rare Candy Paradise logo</title>
  <desc id="desc">Logo com card arredondado em gradiente azul violeta e simbolo de candy estilizado.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="18" x2="124" y2="126" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8857ef" />
      <stop offset=".48" stop-color="#2f68ea" />
      <stop offset="1" stop-color="#59dfd7" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(43 34) rotate(52) scale(50 42)">
      <stop stop-color="#ffd96d" stop-opacity=".88" />
      <stop offset="1" stop-color="#ffd96d" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="spark" x1="83" y1="26" x2="115" y2="57" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe784" />
      <stop offset="1" stop-color="#ff9d48" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#081128" flood-opacity=".28" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="12" y="12" width="120" height="120" rx="32" fill="url(#bg)" />
    <rect x="22" y="22" width="100" height="100" rx="26" fill="url(#glow)" />
    <path d="M84 24 116 38 104 69 72 55Z" fill="#ffffff" opacity=".14" />
    <circle cx="44" cy="39" r="8" fill="#ffd75b" />
    <path d="M89 28c6 0 11 5 11 11s-5 11-11 11-11-5-11-11 5-11 11-11Z" fill="url(#spark)" transform="rotate(-21 89 39)" />
    <rect x="91" y="54" width="24" height="11" rx="5.5" fill="#ffb149" transform="rotate(24 91 54)" />
    <path d="M43 84c0-22 16-39 37-39 12 0 22 4 30 13L98 70c-5-5-11-8-18-8-12 0-22 10-22 23 0 13 10 23 23 23 9 0 15-4 21-11l12 10c-8 12-20 18-35 18-23 0-36-16-36-41Z" fill="#fff7ea" />
    <path d="M54 83c0-12 9-20 21-20 8 0 14 3 18 9l-12 5c-2-2-4-3-7-3-5 0-8 4-8 9 0 6 4 10 9 10 4 0 7-2 9-5l12 5c-4 8-11 12-21 12-13 0-21-8-21-22Z" fill="#0d1a3d" opacity=".14" />
